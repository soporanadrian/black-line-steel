# Netlify Configuration File
# For more info: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Directory to deploy
  publish = "."
  # Build command (optional - we don't need to build since it's static HTML/CSS/JS)
  # command = ""

# Redirect rules
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Custom headers for performance and security
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Performance headers
    Cache-Control = "public, max-age=3600"

# Cache rules for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"
    Cache-Control = "public, max-age=31536000, immutable"

# HTML cache control (shorter cache for HTML files)
[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

# Form handling configuration
[context.production.environment]
  # Netlify Forms is enabled by default
